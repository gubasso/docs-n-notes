# lychee link-checker config for this knowledge base.
#
# Knowledge-base notes accumulate links to external resources that lychee
# can't fairly validate from a CI / pre-push context:
#   - Stack Overflow, Medium, Reddit, etc. return 403 to bots.
#   - Several hosts rate-limit aggressively (429).
#   - file:// links often point to sibling repos on the author's machine.
# This config narrows lychee to checking links it can verify with high
# signal: real 404s, malformed URLs, and dead http(s) endpoints.

# Only check http(s) URLs; file:// links across local projects aren't
# meaningful from this repo's checkout.
scheme = ["http", "https"]

# Tolerate bot-blocking and rate-limit responses so they don't flood the
# report. 200/203/206 are normal OK; 401/403 frequently mean "anti-bot
# challenge" rather than "dead link"; 429/503 are transient.
accept = ["200..=206", "401", "403", "429", "503", "520..=525"]

# Network behavior — keep pre-push runs bounded.
# Concurrency: lychee's own default is 14. The bottleneck is per-host
# rate limits, not local CPU, so going higher lets requests to *different*
# hosts overlap and roughly halves wall-time on this KB (~3m → ~1.5m).
max_concurrency = 32
max_retries = 1
timeout = 20
retry_wait_time = 2

# Don't follow redirect storms (vendor loops like milvus.io).
max_redirects = 5

# Cache aggressively; pre-commit re-invokes lychee on every push.
cache = true
max_cache_age = "1d"

# Hosts that consistently reject lychee even when the page is fine,
# or that aren't worth flapping CI over.
exclude = [
  # Anti-bot challenge hosts — links are valid in a browser.
  "^https?://(www\\.)?stackoverflow\\.com",
  "^https?://(www\\.)?superuser\\.com",
  "^https?://(www\\.)?serverfault\\.com",
  "^https?://(www\\.)?askubuntu\\.com",
  "^https?://(www\\.)?unix\\.stackexchange\\.com",
  "^https?://(www\\.)?leetcode\\.com",
  "^https?://medium\\.com",
  "^https?://(www\\.)?linode\\.com",
  "^https?://(www\\.)?udemy\\.com",
  "^https?://(www\\.)?npmjs\\.com",
  "^https?://(www\\.)?wincent\\.com",
  "^https?://(www\\.)?flaticon\\.com",
  "^https?://(www\\.)?iconfinder\\.com",
  "^https?://(www\\.)?eos-icons\\.com",
  "^https?://en\\.opensuse\\.org",
  "^https?://software\\.opensuse\\.org",
  "^https?://(www\\.)?dnschecker\\.org",
  "^https?://wasabi-support\\.zendesk\\.com",
  "^https?://bluexp\\.netapp\\.com",
  "^https?://(www\\.)?builder\\.ai",
  "^https?://help\\.openai\\.com",
  "^https?://vim\\.fandom\\.com",
  "^https?://web\\.archive\\.org",
  "^https?://dl\\.acm\\.org",
  "^https?://linearb\\.io",
  "^https?://(www\\.)?gnu\\.org",
  # YouTube — videos vanish constantly; not worth gating pushes on.
  "^https?://(www\\.)?youtube\\.com/watch",
  # Cached file in DESTDIR docs etc.
  "^https?://(www\\.)?nano-editor\\.org",
  # Hosts with chronic network/TLS issues (page-side, not link-side).
  "^https?://(www\\.)?javatpoint\\.com",
  "^https?://(www\\.)?canyouseeme\\.org",
  "^https?://(www\\.)?lowendstock\\.com",
  "^https?://(www\\.)?vpsfilter\\.com",
  "^https?://(www\\.)?blobmaker\\.app",
  "^https?://(www\\.)?smalldev\\.tools",
  "^https?://(www\\.)?sirlagz\\.net",
  "^https?://(www\\.)?thispointer\\.com",
  "^https?://(www\\.)?openquest\\.xyz",
  "^https?://(www\\.)?clockwork\\.xyz",
  "^https?://(www\\.)?milvus\\.io",
  # martinfowler.com — times out under bot-style requests (pre-push context).
  "^https?://(www\\.)?martinfowler\\.com",
  # argyllcms.com — chronic timeouts on pre-push (slow origin).
  "^https?://(www\\.)?argyllcms\\.com",
  # 2daygeek.com — intermittent 500s on pre-push.
  "^https?://(www\\.)?2daygeek\\.com",
  # forums.linuxmint.com — 307 redirect loop on tracked URLs.
  "^https?://forums\\.linuxmint\\.com",
  # Twitter card thumbnails: ephemeral by design.
  "^https?://pbs\\.twimg\\.com",
  # mail-tester opens a fresh inbox per visit and rate-limits scrapers.
  "^https?://(www\\.)?mail-tester\\.com",
  # Vendor docs that reorganized their URL structure wholesale.
  # Keep historical references in notes; don't gate pushes on dead old paths.
  "^https?://(www\\.)?internetcomputer\\.org",
  "^https?://(www\\.)?solana\\.com/docs",
  "^https?://docs\\.aws\\.amazon\\.com/prescriptive-guidance",
  "^https?://blog\\.cloudflare\\.com",
  "^https?://www2?\\.eecs\\.berkeley\\.edu/Pubs/TechRpts",
  "^https?://enterprisecraftsmanship\\.com",
  "^https?://appdividend\\.com",
  "^https?://docs\\.python-cerberus\\.org",
  "^https?://calyptus\\.co",
  "^https?://git-annex\\.branchable\\.com",
  # GitHub repo paths in own dotfiles that have since been reorganized.
  "^https?://github\\.com/gubasso/(dotfiles|docs-n-notes)/blob/master",
]

# Don't try to verify localhost / loopback URLs from notes.
exclude_loopback = true
