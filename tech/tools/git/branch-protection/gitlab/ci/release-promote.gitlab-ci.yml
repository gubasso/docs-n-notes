# Release-promotion job: tag v* on develop → fast-forward main → release.
#
# Include in a project's .gitlab-ci.yml:
#   include:
#     - local: '.gitlab/ci/release-promote.gitlab-ci.yml'
# or copy the jobs inline.

stages:
  - test
  - release

test:
  stage: test
  script:
    - echo "run tests"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

promote-to-main:
  stage: release
  image: alpine/git:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  script:
    - apk add --no-cache bash curl jq
    - git fetch origin develop main
    - git merge-base --is-ancestor "$CI_COMMIT_SHA" origin/develop
        || { echo "Tag not on develop"; exit 1; }
    - git config user.name  "gitlab-ci"
    - git config user.email "ci@${CI_SERVER_HOST}"
    - git checkout -B main origin/main
    - git merge --ff-only "$CI_COMMIT_SHA"
    - |
      if [ -n "${PROMOTE_TOKEN:-}" ]; then
        AUTH="oauth2:${PROMOTE_TOKEN}"
      else
        AUTH="gitlab-ci-token:${CI_JOB_TOKEN}"
      fi
    - git push "https://${AUTH}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" main

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: [promote-to-main]
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  script:
    - echo "releasing $CI_COMMIT_TAG"
  release:
    tag_name: '$CI_COMMIT_TAG'
    description: 'Release $CI_COMMIT_TAG'
