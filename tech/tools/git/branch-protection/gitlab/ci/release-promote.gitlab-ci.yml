# Release-promotion job: tag v* on develop → fast-forward master → release.
#
# Include in a project's .gitlab-ci.yml:
#   include:
#     - local: '.gitlab/ci/release-promote.gitlab-ci.yml'
# or copy the jobs inline.

stages:
  - test
  - release

test:
  stage: test
  script:
    - echo "run tests"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

promote-to-master:
  stage: release
  image: alpine/git:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  script:
    - apk add --no-cache bash curl jq
    # Promotion targets the release TAG ($CI_COMMIT_TAG), the canonical release
    # marker, not an arbitrary branch SHA. Resolve the tagged commit explicitly.
    - git fetch origin develop
    - TAG_SHA="$(git rev-parse "refs/tags/${CI_COMMIT_TAG}^{commit}")"
    - git merge-base --is-ancestor "$TAG_SHA" origin/develop
        || { echo "Tag not on develop"; exit 1; }
    - git config user.name  "gitlab-ci"
    - git config user.email "ci@${CI_SERVER_HOST}"
    - |
      if git fetch origin master; then
        git checkout -B master origin/master
        git merge --ff-only "$TAG_SHA"
      else
        # master does not exist yet: create it at the release tag.
        git checkout -B master "$TAG_SHA"
      fi
    - |
      if [ -n "${PROMOTE_TOKEN:-}" ]; then
        AUTH="oauth2:${PROMOTE_TOKEN}"
      else
        AUTH="gitlab-ci-token:${CI_JOB_TOKEN}"
      fi
    - git push "https://${AUTH}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" master

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: [promote-to-master]
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  script:
    - echo "releasing $CI_COMMIT_TAG"
  release:
    tag_name: '$CI_COMMIT_TAG'
    description: 'Release $CI_COMMIT_TAG'
